openapi: 3.0.3
info:
  title: CloudLab API
  version: 1.0.0
servers:
  - url: http://localhost:4000
paths:
  /api/auth/register:
    post:
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Created
  /api/auth/login:
    post:
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK
  /api/auth/profile:
    get:
      summary: Get the current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/labs:
    get:
      summary: List the current user's labs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /api/labs/create:
    post:
      summary: Create a lab
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [labType]
              properties:
                labType:
                  type: string
                  enum: [docker, terraform]
      responses:
        '201':
          description: Created
  /api/labs/{id}:
    delete:
      summary: Delete a lab
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT