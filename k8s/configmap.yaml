apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudlab-backend-config
  namespace: cloudlab
data:
  NODE_ENV: production
  PORT: "4000"
  CORS_ORIGIN: http://localhost:8080
  JWT_EXPIRES_IN: 7d
  LAB_CONTAINER_PORT: "80"
  LAB_SERVICE_TYPE: LoadBalancer
  LAB_BASE_URL: ""
  DOCKER_LAB_IMAGE: ghcr.io/cloudlab/docker-lab:latest
  TERRAFORM_LAB_IMAGE: ghcr.io/cloudlab/terraform-lab:latest