name: CloudLab CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [backend, frontend]

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build --if-present

      - name: Syntax check
        run: npm run lint --if-present

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/cloudlab-backend:${{ github.sha }} ./backend
          docker tag ${{ secrets.ACR_NAME }}.azurecr.io/cloudlab-backend:${{ github.sha }} ${{ secrets.ACR_NAME }}.azurecr.io/cloudlab-backend:latest

      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/cloudlab-frontend:${{ github.sha }} ./frontend
          docker tag ${{ secrets.ACR_NAME }}.azurecr.io/cloudlab-frontend:${{ github.sha }} ${{ secrets.ACR_NAME }}.azurecr.io/cloudlab-frontend:latest

      - name: Push images
        run: |
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/cloudlab-backend:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/cloudlab-backend:latest
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/cloudlab-frontend:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/cloudlab-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl create secret generic cloudlab-backend-secret \
            --namespace cloudlab \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/ingress.yaml