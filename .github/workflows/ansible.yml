name: Ansible CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ansible:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Syntax Check
        run: |
          ansible-playbook --syntax-check ansible/docker.yml